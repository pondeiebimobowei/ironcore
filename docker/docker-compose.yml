services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: ironcore-retain-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ironcore:ironcore@db:5432/ironcore_retain}
      API_PORT: ${API_PORT:-4000}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      COOKIE_SECRET: ${COOKIE_SECRET:-change-me-cookie-secret}
      GLITCHTIP_DSN: ${GLITCHTIP_DSN:-}
    ports:
      - "${API_PORT:-4000}:4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const http = require('http'); const req = http.get('http://127.0.0.1:4000/api/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)); req.on('error', () => process.exit(1)); req.setTimeout(4000, () => { req.destroy(); process.exit(1); });\"",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
        VITE_SUPPORT_EMAIL: ${VITE_SUPPORT_EMAIL:-support@ironcore-retain.local}
        VITE_GLITCHTIP_DSN: ${VITE_GLITCHTIP_DSN:-}
        VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY:-}
        VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST:-https://app.posthog.com}
    container_name: ironcore-retain-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      api:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: ironcore-retain-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ironcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ironcore}
      POSTGRES_DB: ${POSTGRES_DB:-ironcore_retain}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ironcore-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ironcore-postgres-data:
