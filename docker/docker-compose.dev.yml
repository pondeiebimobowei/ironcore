services:
  api:
    volumes:
      - ../apps/api:/app
      - /app/node_modules
    command: npm run dev
    environment:
      NODE_ENV: development

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "${WEB_PORT:-8080}:5173"
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:4000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npm run dev -- --host 0.0.0.0
